<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bella's Hair Studio — Book Online</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf8f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .tagline {
      font-size: 13px;
      color: #aaa;
      margin-left: auto;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 520px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 0;
    }

    .chat-intro {
      text-align: center;
      margin-bottom: 24px;
    }

    .chat-intro h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .chat-intro p {
      font-size: 14px;
      color: #666;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-bottom: 16px;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      animation: pop 0.15s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bubble.agent {
      background: #fff;
      border: 1px solid #e8e2d9;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #1a1a1a;
    }

    .bubble.user {
      background: #1a1a1a;
      color: #fff;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    .bubble.typing {
      background: #fff;
      border: 1px solid #e8e2d9;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      color: #999;
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 16px 0 24px;
      position: sticky;
      bottom: 0;
      background: #faf8f5;
    }

    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      font-size: 15px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #1a1a1a; }

    button {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 13px 22px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
    button:disabled { background: #ccc; cursor: default; }

    .powered {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      padding-bottom: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Bella's Hair Studio</div>
    <div class="tagline">Colchester, Essex</div>
  </header>

  <div class="chat-wrapper">
    <div class="chat-intro">
      <h2>Book an appointment</h2>
      <p>Chat with Aria to find a time that works for you.</p>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-row">
      <input type="text" id="input" placeholder="Type a message..." autocomplete="off" />
      <button id="send">Send</button>
    </div>

    <div class="powered">Powered by AI Booking Agent</div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const history = [];

    function addBubble(text, role) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendBtn.disabled = true;

      addBubble(text, 'user');
      history.push({ role: 'user', content: text });

      const typing = addBubble('Aria is typing…', 'typing');

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const { reply } = await res.json();
      typing.remove();
      addBubble(reply, 'agent');
      history.push({ role: 'assistant', content: reply });
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    // Opening message
    window.addEventListener('load', () => {
      addBubble("Hi! I'm Aria, Bella's booking assistant. What service were you looking for today?", 'agent');
    });
  </script>
</body>
</html>
